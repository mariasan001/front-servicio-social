<!DOCTYPE html>
<html lang="es-MX">
  <head>
    <meta charset="utf-8" />
    <style>
      @font-face {
        font-family: Gotham;
        src: url("../public/font/Gotham Light.otf") format("opentype");
        font-weight: 300;
        font-style: normal;
      }
      @font-face {
        font-family: Gotham;
        src: url("../public/font/Gotham Book.otf") format("opentype");
        font-weight: 400;
        font-style: normal;
      }
      @font-face {
        font-family: Gotham;
        src: url("../public/font/Gotham Bold.otf") format("opentype");
        font-weight: 700;
        font-style: normal;
      }
      @font-face {
        font-family: Gotham;
        src: url("../public/font/Gotham Black.otf") format("opentype");
        font-weight: 900;
        font-style: normal;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 1200px;
        height: 630px;
        overflow: hidden;
        font-family: Gotham, system-ui, sans-serif;
        color: #2d2d2d;
        background: #ffffff;
      }

      .frame {
        position: relative;
        width: 1200px;
        height: 630px;
        overflow: hidden;
        background:
          linear-gradient(180deg, #ffffff 0%, #f7f0e6 100%);
      }

      .side {
        position: absolute;
        inset: 0 auto 0 0;
        width: 18px;
        background: #6b2340;
      }

      .side::after {
        content: "";
        position: absolute;
        left: 18px;
        top: 0;
        bottom: 0;
        width: 6px;
        background: #b8956a;
      }

      .flor {
        position: absolute;
        right: -20px;
        bottom: -50px;
        width: 460px;
        height: auto;
        opacity: 0.1;
        filter: brightness(0) saturate(100%) invert(16%) sepia(45%) saturate(1400%) hue-rotate(314deg) brightness(0.85);
        pointer-events: none;
      }

      .content {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        height: 100%;
        padding: 52px 70px 48px 72px;
      }

      .top {
        display: flex;
        align-items: center;
        gap: 22px;
      }

      .logo {
        height: 70px;
        width: auto;
        display: block;
      }

      .divider {
        width: 1px;
        height: 48px;
        background: rgb(107 35 64 / 20%);
      }

      .eyebrow {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #7a5e38;
      }

      .main {
        max-width: 820px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        padding-bottom: 8px;
      }

      .title {
        font-size: 68px;
        font-weight: 900;
        line-height: 1.02;
        letter-spacing: -0.03em;
      }

      .title span {
        display: block;
      }

      .title-dark {
        color: #2d2d2d;
      }

      .title-vino {
        color: #6b2340;
      }

      .title-dorado {
        color: #7a5e38;
      }

      .rule {
        width: 96px;
        height: 3px;
        background: linear-gradient(90deg, #6b2340 0%, #b8956a 100%);
      }

      .subtitle {
        max-width: 640px;
        font-size: 23px;
        font-weight: 300;
        line-height: 1.5;
        color: #5c5c5c;
      }

      .footer {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 24px;
        border-top: 1px solid rgb(184 149 106 / 35%);
        padding-top: 22px;
      }

      .footer-label {
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #6b2340;
      }

      .url {
        font-size: 16px;
        font-weight: 400;
        color: #707070;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="side" aria-hidden="true"></div>
      <img class="flor" src="../public/images/Flor_3.png" alt="" />
      <div class="content">
        <div class="top">
          <img class="logo" src="../public/images/logo.webp" alt="Estado de México" />
          <div class="divider" aria-hidden="true"></div>
          <p class="eyebrow">Gobierno del Estado de México</p>
        </div>

        <div class="main">
          <h1 class="title">
            <span class="title-dark">Plataforma de</span>
            <span class="title-vino">Servicio Social</span>
            <span class="title-dorado">y prácticas</span>
          </h1>
          <div class="rule" aria-hidden="true"></div>
          <p class="subtitle">
            Consulta vacantes, da seguimiento y concluye tu servicio en
            dependencias estatales.
          </p>
        </div>

        <div class="footer">
          <p class="footer-label">Plataforma oficial</p>
          <p class="url">serviciosocial.edomex.gob.mx</p>
        </div>
      </div>
    </div>
  </body>
</html>
